<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
 <title>EduLearn — Sign Up</title>
  <meta name="description" content="Create a free EduLearn account and join 50,000+ learners worldwide.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-mortarboard-fill me-2"></i>EduLearn</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="signin.html">Sign In</a></li>
          <li class="nav-item"><a class="btn btn-warning btn-sm ms-2 active" href="signup.html">Sign Up</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="d-flex align-items-center justify-content-center py-5">
    <div class="card shadow border-0 p-4" style="width:100%; max-width:480px;">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill text-primary fs-1"></i>
        <h3 class="fw-bold mt-2">Create Account</h3>
        <p class="text-muted">Join 50,000+ learners on EduLearn</p>
      </div>
      <form id="signupForm" novalidate>
        <div class="mb-3">
          <label for="regName" class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" id="regName" placeholder="Jane Otieno">
          <p class="error-msg" id="regNameError"></p>
        </div>
        <div class="mb-3">
          <label for="regEmail" class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" id="regEmail" placeholder="you@example.com">
          <p class="error-msg" id="regEmailError"></p>
        </div>
        <div class="mb-3">
          <label for="regPassword" class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="Min 8 chars, mixed case + number">
          <p class="error-msg" id="regPwdError"></p>
        </div>
        <div class="mb-3">
          <label for="regConfirm" class="form-label fw-semibold">Confirm Password</label>
          <input type="password" class="form-control" id="regConfirm" placeholder="Repeat your password">
          <p class="error-msg" id="regConfirmError"></p>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terms" required>
          <label class="form-check-label" for="terms">
            I agree to the <a href="#" class="text-primary">Terms & Conditions</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account</button>
        <div id="signupSuccess" class="alert alert-success mt-3 d-none">
          <i class="bi bi-check-circle me-2"></i>Account created! <a href="signin.html">Sign in now</a>.
        </div>
      </form>
      <hr>
      <p class="text-center mb-0">Already have an account? <a href="signin.html" class="text-primary fw-bold">Sign In</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

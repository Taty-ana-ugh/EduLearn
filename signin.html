<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduLearn — Sign In</title>
  <meta name="description" content="Sign in to your EduLearn account to continue learning.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-mortarboard-fill me-2"></i>EduLearn</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="signin.html">Sign In</a></li>
          <li class="nav-item"><a class="btn btn-warning btn-sm ms-2" href="signup.html">Sign Up</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow border-0 p-4" style="width:100%; max-width:420px;">
      <div class="text-center mb-4">
        <i class="bi bi-mortarboard-fill text-primary fs-1"></i>
        <h3 class="fw-bold mt-2">Welcome Back</h3>
        <p class="text-muted">Sign in to continue learning</p>
      </div>
      <form id="signinForm">
        <div class="mb-3">
          <label for="siEmail" class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" id="siEmail" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label for="siPassword" class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" id="siPassword" placeholder="Your password" required>
        </div>
        <div class="d-flex justify-content-between mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="text-primary text-decoration-none small">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In</button>
      </form>
      <hr>
      <p class="text-center mb-0">Don't have an account? <a href="signup.html" class="text-primary fw-bold">Sign Up</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
